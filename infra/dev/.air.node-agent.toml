# hot reload ของ node-agent ใน dev container (ใช้โดย infra/docker-compose.dev.app.yml)
# cwd = /src/apps/node-agent; GOWORK=off มาจาก compose env เพื่อให้ replace ../../packages/proto resolve
root = "."
tmp_dir = "/tmp/air-node-agent"

[build]
cmd = "go build -o /tmp/air-node-agent/agent ./cmd/agent"
bin = "/tmp/air-node-agent/agent"
delay = 300
include_ext = ["go"]
exclude_dir = ["tmp"]
stop_on_error = true
send_interrupt = true
kill_delay = "3s"

[log]
time = true

[misc]
clean_on_exit = true
