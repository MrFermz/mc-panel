# NATS server config ของ mc-panel
# - เปิด JetStream
# - บังคับ auth เสมอ แยก user ระหว่าง control-plane กับ agent
# - agent จำกัด subject ได้แค่ที่จำเป็น (least privilege)
#
# หมายเหตุ: ตอนนี้ agent ทุกตัวใช้ user เดียวกัน (sub mcpanel.jobs.> ได้ทุก node)
# เมื่อไปหลาย node จริงต้องยกระดับเป็น NKey/JWT ต่อ node ตาม docs/architecture.md

port: 4222

http_port: 8222  # monitoring — ห้าม expose ออกนอก docker network

jetstream {
  store_dir: /data
  max_memory_store: 256MB
  max_file_store: 2GB
}

authorization {
  users = [
    {
      user: $NATS_CONTROL_USER
      password: $NATS_CONTROL_PASSWORD
      # control-plane จัดการ stream/consumer + ส่ง job + รับผลลัพธ์
      # ต้องมี $JS.ACK.> เพราะ msg.Ack() ของ result consumer publish ไป
      # $JS.ACK.RESULTS.cp-results.* — ขาดสิทธิ์นี้ ack ไม่ถึง server แล้ว
      # result ทุกอันจะถูก redeliver วนไม่จบ (bug ที่เคยเกิด)
      permissions: {
        publish: [ "mcpanel.>", "$JS.API.>", "$JS.ACK.>" ]
        subscribe: [ "mcpanel.>", "_INBOX.>" ]
      }
    }
    {
      user: $NATS_AGENT_USER
      password: $NATS_AGENT_PASSWORD
      # agent ดึงงาน + รายงานผล เท่านั้น — consumer ถูกสร้างโดย control-plane
      # agent ห้ามสร้าง/ลบ consumer เอง
      permissions: {
        publish: [ "mcpanel.results", "$JS.API.CONSUMER.MSG.NEXT.JOBS.>", "$JS.ACK.JOBS.>", "$JS.API.CONSUMER.INFO.JOBS.>", "$JS.API.STREAM.INFO.JOBS" ]
        subscribe: [ "mcpanel.jobs.>", "_INBOX.>" ]
      }
    }
  ]
}
