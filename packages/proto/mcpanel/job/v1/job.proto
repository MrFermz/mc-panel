syntax = "proto3";

package mcpanel.job.v1;

option go_package = "github.com/mc-panel/proto/gen/go/mcpanel/job/v1;jobv1";

// Job messages วิ่งบน NATS JetStream (protobuf binary)
//
// Subjects:
//   mcpanel.jobs.{node_id}   control-plane -> agent (stream JOBS, pull consumer ต่อ node)
//   mcpanel.results          agent -> control-plane (stream RESULTS)
//
// DB (`jobs` table) เป็น source of truth ของสถานะงานเสมอ — NATS เป็นแค่ transport
// agent ต้อง ack หลังทำเสร็จ (สำเร็จหรือล้มเหลวก็ ack แล้วรายงานผ่าน JobResult)
// เพราะฉะนั้นงานทุกชนิดต้องเขียนแบบ idempotent — โดน redeliver ซ้ำต้องไม่พัง

message JobEnvelope {
  string job_id = 1;    // UUID ของแถวใน jobs table
  string server_id = 2; // UUID ของ server ที่เกี่ยวข้อง
  oneof payload {
    CreateServer create_server = 10;
    StartServer start_server = 11;
    StopServer stop_server = 12;
    KillServer kill_server = 13;
    DeleteServer delete_server = 14;
    ImportServer import_server = 15;
  }
}

// CreateServer = provision: สร้าง directory, โหลด jar จาก official source,
// เขียน eula.txt / config / launch script — ยังไม่ start
message CreateServer {
  string server_type = 1; // vanilla | paper | fabric | forge | velocity
  string mc_version = 2;  // เช่น "1.21.4" (สำหรับ velocity = velocity version)
  bool accept_eula = 3;   // user ต้องติ๊กยอมรับเองตอนสร้าง ระบบห้าม default เป็น true
}

// ImportServer = เหมือน CreateServer แต่ไม่โหลด jar — แตก zip ที่ upload มา (staged ไว้ที่
// archive_path ใน jail ผ่าน chunked file write) เข้า server dir แล้ว provision (eula/meta/launch) ต่อ
// ทุก entry ใน zip ต้องผ่าน SafeJoin ก่อนเขียน (กัน zip-slip) + chown 1000:1000
message ImportServer {
  string server_type = 1; // vanilla | paper | fabric | forge | velocity
  string mc_version = 2;
  bool accept_eula = 3;
  string archive_path = 4; // path relative ต่อ jail ของ zip ที่ staged ไว้ เช่น ".mcpanel/import.zip"
}

message StartServer {
  int32 memory_mb = 1;    // Xmx ของ JVM — agent ตั้ง container limit เผื่อ overhead เอง
  int32 host_port = 2;    // 0 = ไม่ expose host port (เข้าถึงผ่าน velocity ใน network เดียวกัน)
  string docker_image = 3; // เช่น mcpanel/mc-runtime:21 — control-plane เป็นคน map java version
}

message StopServer {
  bool graceful = 1; // true = เขียน stop word เข้า stdin ก่อน แล้วรอ grace period
}

message KillServer {}

// DeleteServer: stop + ลบ container + ลบ directory ใต้ MC_DATA_DIR
// agent ต้อง validate path อยู่ใต้ MC_DATA_DIR ก่อน RemoveAll เสมอ
message DeleteServer {}

message JobResult {
  string job_id = 1;
  string server_id = 2;
  bool success = 3;
  string error = 4;  // ว่างถ้า success
  string detail = 5; // ข้อมูลเสริม เช่น sha ของ jar ที่โหลด
}
